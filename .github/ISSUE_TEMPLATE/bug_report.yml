name: Bug report
description: Report a problem with DocGraph
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the exact command(s) or MCP tool call(s).
      placeholder: |
        1. docgraph index ./example
        2. docgraph search "..."
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DocGraph version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v20.11.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output (run the MCP server with DOCGRAPH_DEBUG=1 if applicable).
      render: shell
